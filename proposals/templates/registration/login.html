<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Генератор ТКП</title>
    {% load static %}
    <style>
        :root {
            --bg: #100E1C;
            --card: #fff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --sidebar-gradient: linear-gradient(180deg, #45277B 0%, #331A42 100%);
        }
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }
        .login-card { background: var(--card); border-radius: 12px; padding: 2rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); width: 100%; max-width: 360px; }
        .login-card h1 { font-size: 1.5rem; margin: 0 0 1.5rem; color: var(--text); text-align: center; }
        .login-card .logo { text-align: center; margin-bottom: 1.5rem; }
        .login-card .logo img { max-height: 48px; width: auto; }
        label { display: block; font-weight: 500; margin-bottom: 0.25rem; color: var(--text); }
        input[type="text"], input[type="password"] { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; margin-bottom: 1rem; }
        button[type="submit"] { width: 100%; padding: 0.6rem 1.25rem; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
        button[type="submit"]:hover { background: var(--primary-hover); }
        .errorlist { color: #dc2626; font-size: 0.875rem; margin: 0 0 1rem; list-style: none; padding: 0; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <a href="{% url 'proposals:form' %}"><img src="{% static 'logo.png' %}" alt="Генератор ТКП" /></a>
        </div>
        <h1>Вход в систему</h1>
        {% if form.errors %}
        <ul class="errorlist">
            {% for error in form.non_field_errors %}<li>{{ error }}</li>{% endfor %}
            {% for field in form %}{% for error in field.errors %}<li>{{ error }}</li>{% endfor %}{% endfor %}
        </ul>
        {% endif %}
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            <label for="id_username">Имя пользователя</label>
            <input type="text" name="username" id="id_username" required autofocus>
            <label for="id_password">Пароль</label>
            <input type="password" name="password" id="id_password" required>
            <button type="submit">Войти</button>
        </form>
    </div>
</body>
</html>
