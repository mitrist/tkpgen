<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Генератор ТКП{% endblock %}</title>
    {% load static %}
    <style>
        :root {
            --bg: #100E1C;
            --card: #fff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --success: #059669;
            --sidebar-w: 220px;
            --sidebar-gradient: linear-gradient(180deg, #45277B 0%, #331A42 100%);
        }
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.5; }
        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--sidebar-gradient); border-right: 1px solid rgba(255,255,255,.1); padding: 0; display: flex; flex-direction: column; }
        .sidebar-header { padding: 1.25rem 1rem; border-bottom: 1px solid rgba(255,255,255,.15); }
        .sidebar-header img { display: block; max-width: 100%; height: auto; max-height: 48px; object-fit: contain; }
        .sidebar nav { display: flex; flex-direction: column; gap: 0.25rem; padding: 1rem 0; flex: 1; }
        .sidebar a { padding: 0.5rem 1.25rem; color: #fff; text-decoration: none; font-family: Aptos, 'Segoe UI', system-ui, sans-serif; }
        .sidebar a:hover { background: rgba(255,255,255,.12); }
        .sidebar .nav-active { background: rgba(255,255,255,.2); font-weight: 500; }
        .sidebar-footer { padding: 1rem 1rem 1.25rem; border-top: 1px solid rgba(255,255,255,.15); }
        .sidebar-footer img { display: block; max-width: 100%; height: auto; max-height: 56px; object-fit: contain; }
        .main { flex: 1; padding: 2rem; overflow-x: auto; background: var(--bg); }
        .container { max-width: 560px; margin: 0; }
        .container--wide { max-width: none; }
        .card { background: var(--card); border-radius: 12px; padding: 2rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        h1 { font-size: 1.5rem; margin: 0 0 1.5rem; color: var(--text); }
        label { display: block; font-weight: 500; margin-bottom: 0.25rem; color: var(--text); }
        input, select, textarea { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; margin-bottom: 1rem; }
        textarea { resize: vertical; min-height: 80px; }
        button, .btn { display: inline-block; padding: 0.6rem 1.25rem; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; text-decoration: none; }
        button:hover, .btn:hover { background: var(--primary-hover); }
        .btn-secondary { background: var(--text-muted); }
        .btn-secondary:hover { background: #4b5563; }
        .summary { background: #f9fafb; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .summary dt { font-weight: 600; color: var(--text-muted); font-size: 0.875rem; margin-top: 0.75rem; }
        .summary dt:first-child { margin-top: 0; }
        .summary dd { margin: 0.25rem 0 0; }
        .actions { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 1.5rem; }
        .help { font-size: 0.875rem; color: var(--text-muted); margin-top: 0.25rem; }
        .errorlist { color: #dc2626; font-size: 0.875rem; margin: 0 0 1rem; list-style: none; padding: 0; }
        .complex-table-wrap { overflow-x: auto; }
        .topbar { display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; height: 52px; background: var(--sidebar-gradient); border-bottom: 1px solid rgba(255,255,255,.15); align-items: center; justify-content: space-between; padding: 0 1rem; }
        .topbar-logo { display: flex; align-items: center; height: 100%; }
        .topbar-logo img { max-height: 36px; width: auto; object-fit: contain; }
        .topbar-menu-btn { width: 2.5rem; height: 2.5rem; padding: 0; border: none; background: transparent; color: #fff; cursor: pointer; align-items: center; justify-content: center; border-radius: 6px; }
        .topbar-menu-btn:hover { background: rgba(255,255,255,.15); }
        .topbar-menu-btn svg { width: 1.5rem; height: 1.5rem; }
        .topbar-dropdown { display: none; position: absolute; top: 100%; left: 0; right: 0; background: #331A42; border-bottom: 1px solid rgba(255,255,255,.1); box-shadow: 0 4px 12px rgba(0,0,0,.3); z-index: 1001; }
        .topbar-dropdown.is-open { display: block; }
        .topbar-dropdown a { display: block; padding: 0.75rem 1rem; color: #fff; text-decoration: none; font-size: 0.9375rem; border-bottom: 1px solid rgba(255,255,255,.08); }
        .topbar-dropdown a:last-child { border-bottom: none; }
        .topbar-dropdown a:hover { background: rgba(255,255,255,.1); }
        .topbar-dropdown a.nav-active { background: rgba(255,255,255,.2); font-weight: 500; }
        @media (max-width: 768px) {
            .topbar { display: flex; }
            .sidebar { display: none !important; }
            .main { margin-left: 0; padding: 1rem; padding-top: 3.75rem; min-width: 0; }
            .card { padding: 1.25rem; }
            .container { max-width: none; }
            h1 { font-size: 1.25rem; }
            input, select, textarea, button, .btn { font-size: 16px; max-width: 100%; }
            .actions { flex-direction: column; align-items: stretch; }
            .actions .btn { text-align: center; }
            .topbar-dropdown.is-open { display: block; }
            .complex-table-wrap { overflow: visible; max-width: 100%; }
            .complex-table thead { display: none; }
            .complex-table tbody tr { display: block; margin-bottom: 0.75rem; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; background: #f9fafb; }
            .complex-table tbody td { display: block; padding: 0.35rem 0; border: none; }
            .complex-table tbody td::before { content: attr(data-label); font-weight: 600; color: var(--text-muted); font-size: 0.75rem; display: block; margin-bottom: 0.15rem; }
            .complex-table tbody td.col-num::before { content: attr(data-label); }
            .complex-table tbody .btn-remove { margin-top: 0.5rem; }
            .complex-table tbody td[data-label=""]::before { display: none; }
            .complex-form-header { grid-template-columns: 1fr !important; }
        }
    </style>
</head>
<body>
    <header class="topbar" id="topbar">
        <a href="{% url 'proposals:form' %}" class="topbar-logo">
            <img src="{% static 'logo.png' %}" alt="Генератор ТКП" />
        </a>
        <button type="button" class="topbar-menu-btn" id="topbar-menu-btn" aria-label="Меню" aria-expanded="false">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <nav class="topbar-dropdown" id="topbar-dropdown" aria-hidden="true">
            <a href="{% url 'proposals:form' %}" {% if request.resolver_match.url_name == 'form' or request.resolver_match.url_name == 'confirm' or request.resolver_match.url_name == 'download_success' %}class="nav-active"{% endif %}>Формирование ТКП</a>
            <a href="{% url 'proposals:complex_form' %}" {% if request.resolver_match.url_name == 'complex_form' or request.resolver_match.url_name == 'complex_confirm' %}class="nav-active"{% endif %}>Комплексное ТКП</a>
            <a href="{% url 'proposals:table' %}" {% if request.resolver_match.url_name == 'table' %}class="nav-active"{% endif %}>Перечень ТКП</a>
            <a href="{% url 'proposals:tariffs' %}" {% if request.resolver_match.url_name == 'tariffs' %}class="nav-active"{% endif %}>Тарифы по регионам</a>
            <a href="https://www.plksoft.ru" target="_blank" rel="noopener noreferrer">PLK Soft</a>
        </nav>
    </header>
    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="{% url 'proposals:form' %}">
                    <img src="{% static 'logo.png' %}" alt="Логотип" />
                </a>
            </div>
            <nav>
                <a href="{% url 'proposals:form' %}" {% if request.resolver_match.url_name == 'form' or request.resolver_match.url_name == 'confirm' or request.resolver_match.url_name == 'download_success' %}class="nav-active"{% endif %}>Формирование ТКП</a>
                <a href="{% url 'proposals:complex_form' %}" {% if request.resolver_match.url_name == 'complex_form' or request.resolver_match.url_name == 'complex_confirm' %}class="nav-active"{% endif %}>Комплексное ТКП</a>
                <a href="{% url 'proposals:table' %}" {% if request.resolver_match.url_name == 'table' %}class="nav-active"{% endif %}>Перечень ТКП</a>
                <a href="{% url 'proposals:tariffs' %}" {% if request.resolver_match.url_name == 'tariffs' %}class="nav-active"{% endif %}>Тарифы по регионам</a>
            </nav>
            <div class="sidebar-footer">
                <a href="https://www.plksoft.ru" target="_blank" rel="noopener noreferrer">
                    <img src="{% static 'plk_logo.png' %}" alt="PLK" />
                </a>
            </div>
        </aside>
        <main class="main">
            <div class="container {% block container_extra_class %}{% endblock %}">
                <div class="card">
                    {% if messages %}
                    <ul class="errorlist">
                        {% for msg in messages %}<li>{{ msg }}</li>{% endfor %}
                    </ul>
                    {% endif %}
                    {% block content %}{% endblock %}
                </div>
            </div>
        </main>
    </div>
    <script>
    (function() {
        var btn = document.getElementById('topbar-menu-btn');
        var dropdown = document.getElementById('topbar-dropdown');
        if (!btn || !dropdown) return;
        function openMenu() {
            dropdown.classList.add('is-open');
            dropdown.setAttribute('aria-hidden', 'false');
            btn.setAttribute('aria-expanded', 'true');
        }
        function closeMenu() {
            dropdown.classList.remove('is-open');
            dropdown.setAttribute('aria-hidden', 'true');
            btn.setAttribute('aria-expanded', 'false');
        }
        function toggleMenu() {
            if (dropdown.classList.contains('is-open')) closeMenu(); else openMenu();
        }
        btn.addEventListener('click', toggleMenu);
        dropdown.querySelectorAll('a').forEach(function(a) {
            a.addEventListener('click', closeMenu);
        });
        document.addEventListener('click', function(e) {
            if (dropdown.classList.contains('is-open') && !dropdown.contains(e.target) && !btn.contains(e.target)) closeMenu();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && dropdown.classList.contains('is-open')) closeMenu();
        });
    })();
    </script>
</body>
</html>
