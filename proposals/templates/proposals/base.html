<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Генератор ТКП{% endblock %}</title>
    {% load static %}
    <style>
        :root {
            --bg: #100E1C;
            --card: #fff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --success: #059669;
            --sidebar-w: 220px;
            --sidebar-gradient: linear-gradient(180deg, #45277B 0%, #331A42 100%);
        }
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.5; }
        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--sidebar-gradient); border-right: 1px solid rgba(255,255,255,.1); padding: 0; display: flex; flex-direction: column; }
        .sidebar-header { padding: 1.25rem 1rem; border-bottom: 1px solid rgba(255,255,255,.15); }
        .sidebar-header img { display: block; max-width: 100%; height: auto; max-height: 48px; object-fit: contain; }
        .sidebar nav { display: flex; flex-direction: column; gap: 0.25rem; padding: 1rem 0; flex: 1; }
        .sidebar a { padding: 0.5rem 1.25rem; color: #fff; text-decoration: none; font-family: Aptos, 'Segoe UI', system-ui, sans-serif; }
        .sidebar a:hover { background: rgba(255,255,255,.12); }
        .sidebar .nav-active { background: rgba(255,255,255,.2); font-weight: 500; }
        .sidebar-footer { padding: 1rem 1rem 1.25rem; border-top: 1px solid rgba(255,255,255,.15); }
        .sidebar-footer img { display: block; max-width: 100%; height: auto; max-height: 56px; object-fit: contain; }
        .main { flex: 1; padding: 2rem; overflow-x: auto; background: var(--bg); }
        .container { max-width: 560px; margin: 0; }
        .container--wide { max-width: none; }
        .card { background: var(--card); border-radius: 12px; padding: 2rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        h1 { font-size: 1.5rem; margin: 0 0 1.5rem; color: var(--text); }
        label { display: block; font-weight: 500; margin-bottom: 0.25rem; color: var(--text); }
        input, select, textarea { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; margin-bottom: 1rem; }
        textarea { resize: vertical; min-height: 80px; }
        button, .btn { display: inline-block; padding: 0.6rem 1.25rem; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; text-decoration: none; }
        button:hover, .btn:hover { background: var(--primary-hover); }
        .btn-secondary { background: var(--text-muted); }
        .btn-secondary:hover { background: #4b5563; }
        .summary { background: #f9fafb; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .summary dt { font-weight: 600; color: var(--text-muted); font-size: 0.875rem; margin-top: 0.75rem; }
        .summary dt:first-child { margin-top: 0; }
        .summary dd { margin: 0.25rem 0 0; }
        .actions { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 1.5rem; }
        .help { font-size: 0.875rem; color: var(--text-muted); margin-top: 0.25rem; }
        .errorlist { color: #dc2626; font-size: 0.875rem; margin: 0 0 1rem; list-style: none; padding: 0; }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="{% url 'proposals:form' %}">
                    <img src="{% static 'logo.png' %}" alt="Логотип" />
                </a>
            </div>
            <nav>
                <a href="{% url 'proposals:form' %}" {% if request.resolver_match.url_name == 'form' or request.resolver_match.url_name == 'confirm' or request.resolver_match.url_name == 'download_success' %}class="nav-active"{% endif %}>Формирование ТКП</a>
                <a href="{% url 'proposals:complex_form' %}" {% if request.resolver_match.url_name == 'complex_form' or request.resolver_match.url_name == 'complex_confirm' %}class="nav-active"{% endif %}>Комплексное ТКП</a>
                <a href="{% url 'proposals:table' %}" {% if request.resolver_match.url_name == 'table' %}class="nav-active"{% endif %}>Перечень ТКП</a>
                <a href="{% url 'proposals:tariffs' %}" {% if request.resolver_match.url_name == 'tariffs' %}class="nav-active"{% endif %}>Тарифы по регионам</a>
            </nav>
            <div class="sidebar-footer">
                <a href="https://www.plksoft.ru" target="_blank" rel="noopener noreferrer">
                    <img src="{% static 'plk_logo.png' %}" alt="PLK" />
                </a>
            </div>
        </aside>
        <main class="main">
            <div class="container {% block container_extra_class %}{% endblock %}">
                <div class="card">
                    {% if messages %}
                    <ul class="errorlist">
                        {% for msg in messages %}<li>{{ msg }}</li>{% endfor %}
                    </ul>
                    {% endif %}
                    {% block content %}{% endblock %}
                </div>
            </div>
        </main>
    </div>
</body>
</html>
