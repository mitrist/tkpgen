<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Меню — Генератор ТКП</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #100E1C;
      --card: #fff;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --text: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --sidebar-gradient: linear-gradient(180deg, #45277B 0%, #331A42 100%);
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      padding-bottom: env(safe-area-inset-bottom, 0);
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.5;
      min-height: 100vh;
    }
    .app-header {
      background: var(--sidebar-gradient);
      border-bottom: 1px solid rgba(255,255,255,.15);
      padding: 0.75rem 1rem;
      padding-top: calc(0.75rem + env(safe-area-inset-top, 0));
    }
    .app-header h1 {
      margin: 0;
      font-size: 1.125rem;
      font-weight: 600;
      color: #fff;
    }
    .app-main {
      padding: 1rem;
      max-width: 560px;
      margin: 0 auto;
    }
    .menu-card {
      background: var(--card);
      border-radius: 12px;
      padding: 0;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      overflow: hidden;
    }
    .menu-card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-muted);
      margin: 0;
      padding: 0.75rem 1rem;
      background: #f9fafb;
      border-bottom: 1px solid var(--border);
    }
    .menu-list { list-style: none; margin: 0; padding: 0; }
    .menu-list li { margin: 0; border-bottom: 1px solid var(--border); }
    .menu-list li:last-child { border-bottom: none; }
    .menu-list a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem 1rem;
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      transition: background .15s;
    }
    .menu-list a:hover { background: #f3f4f6; }
    .menu-list a:active { background: #e5e7eb; }
    .menu-list .nav-link-icon {
      width: 1.25rem;
      height: 1.25rem;
      flex-shrink: 0;
      opacity: 0.85;
    }
    .menu-list .sub-item { padding-left: 2rem; font-weight: 400; }
    .menu-divider { height: 0; border: none; border-top: 1px solid var(--border); margin: 0.5rem 0; }
    .menu-section-title {
      padding: 0.6rem 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      background: #f9fafb;
    }
    .menu-external { color: var(--primary); }
  </style>
</head>
<body>
  <header class="app-header">
    <h1>Генератор ТКП</h1>
  </header>
  <main class="app-main">
    <div class="menu-card">
      <ul class="menu-list">
        <li><a href="/start/" class="nav-link">
          <svg class="nav-link-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          Старт
        </a></li>
        <li><a href="/table/" class="nav-link">
          <svg class="nav-link-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
          Реестр ТКП
        </a></li>
        <li><a href="/contracts/" class="nav-link">
          <svg class="nav-link-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          Реестр договоров
        </a></li>
        <li><div class="menu-section-title">Формирование ТКП</div></li>
        <li><a href="/tkp-app/form/" class="nav-link sub-item">
          <svg class="nav-link-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
          ТКП на одну услугу
        </a></li>
        <li><a href="/complex/" class="nav-link sub-item">
          <svg class="nav-link-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
          Комплексное ТКП
        </a></li>
        <li><a href="/tariffs/" class="nav-link sub-item">
          <svg class="nav-link-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Тарифы по регионам
        </a></li>
        <li><a href="/service-descriptions/" class="nav-link sub-item">
          <svg class="nav-link-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16m-7 6h7"/></svg>
          Редактирование описания услуги
        </a></li>
        <li><hr class="menu-divider"></li>
        <li><a href="/kanban/" class="nav-link">
          <svg class="nav-link-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/></svg>
          Канбан
        </a></li>
        <li><a href="/counterparties/" class="nav-link">
          <svg class="nav-link-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
          Контрагенты
        </a></li>
        <li><a href="/instruction/" class="nav-link">
          <svg class="nav-link-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
          Инструкция
        </a></li>
        <li><a href="https://www.plksoft.ru" target="_blank" rel="noopener noreferrer" class="nav-link menu-external">PLK Soft</a></li>
      </ul>
    </div>
  </main>

  <script>
    (function() {
      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
      }
      function haptic() {
        if (tg && tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
      }
      document.querySelectorAll('.menu-list a').forEach(function(a) {
        a.addEventListener('click', function() { haptic(); });
      });
      document.querySelectorAll('.menu-list a[href^="http"]').forEach(function(a) {
        a.addEventListener('click', function(e) {
          if (tg && tg.openLink) {
            e.preventDefault();
            tg.openLink(a.href);
          }
        });
      });
    })();
  </script>
</body>
</html>
