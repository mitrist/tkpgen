<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ТКП — Генератор ТКП</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #100E1C;
      --card: #fff;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --text: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --success: #059669;
      --sidebar-gradient: linear-gradient(180deg, #45277B 0%, #331A42 100%);
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      padding-bottom: env(safe-area-inset-bottom, 0);
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.5;
      min-height: 100vh;
    }
    .app-header {
      background: var(--sidebar-gradient);
      border-bottom: 1px solid rgba(255,255,255,.15);
      padding: 0.75rem 1rem;
      padding-top: calc(0.75rem + env(safe-area-inset-top, 0));
    }
    .app-header h1 {
      margin: 0;
      font-size: 1.125rem;
      font-weight: 600;
      color: #fff;
    }
    .app-main {
      padding: 1rem;
      max-width: 560px;
      margin: 0 auto;
    }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .card h2 {
      font-size: 1.25rem;
      margin: 0 0 1.25rem;
      color: var(--text);
    }
    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-weight: 500;
      margin-bottom: 0.25rem;
      color: var(--text);
      font-size: 0.9375rem;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 1rem;
      background: var(--card);
      color: var(--text);
    }
    .field textarea { resize: vertical; min-height: 72px; }
    .field.hidden { display: none; }
    .field .row { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
    .field .row label { margin-bottom: 0; font-weight: 500; display: flex; align-items: center; gap: 0.35rem; }
    .field input[type="radio"] { width: auto; margin: 0; }
    .btn-primary {
      width: 100%;
      padding: 0.75rem 1.25rem;
      margin-top: 0.5rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    #status {
      margin-top: 0.75rem;
      min-height: 1.5rem;
      font-size: 0.9375rem;
    }
    #status.error { color: #dc2626; }
    #status.success { color: var(--success); }
    .field-error { font-size: 0.8125rem; color: #dc2626; margin-top: 0.25rem; }
    .field.has-error input, .field.has-error select, .field.has-error textarea { border-color: #dc2626; }
    .download-block.hidden { display: none; }
    .download-block .download-message { margin: 1rem 0 0.75rem; color: var(--text); font-size: 0.9375rem; }
    .download-buttons { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 0.5rem; }
    .btn-download {
      padding: 0.6rem 1.25rem;
      min-height: 44px;
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--primary);
      color: #fff;
      border-radius: 6px;
      font-size: 1rem;
      text-decoration: none;
      font-weight: 500;
    }
    .btn-download:hover { background: var(--primary-hover); color: #fff; }
    .btn-download.hidden { display: none; }
    .download-block .download-link-row { margin-top: 1rem; font-size: 0.9375rem; color: var(--text-muted); }
    .download-block .download-link-row a {
      color: var(--primary);
      text-decoration: none;
      word-break: break-all;
      padding: 0.35rem 0;
      display: inline-block;
      min-height: 44px;
      line-height: 1.4;
    }
    .download-block .download-link-row a:hover { text-decoration: underline; }
    @media (max-width: 480px) {
      .btn-download { min-height: 48px; padding: 0.75rem 1.5rem; font-size: 1.0625rem; width: 100%; }
      .download-buttons { flex-direction: column; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <h1>Генератор ТКП</h1>
  </header>
  <main class="app-main">
    <p style="margin: 0 0 0.75rem; font-size: 0.9375rem;"><a href="/tkp-app/" style="color: var(--primary); text-decoration: none;">← Меню</a></p>
    <div class="card">
      <h2>Форма ТКП</h2>
      <form id="form">
    <div class="field">
      <label>Дата ТКП</label>
      <input type="date" name="date" required>
    </div>
    <div class="field">
      <label>Тип заказчика</label>
      <div class="row">
        <label><input type="radio" name="is_internal" value="0" checked> Внешний</label>
        <label><input type="radio" name="is_internal" value="1"> Внутренний</label>
      </div>
    </div>
    <div class="field hidden" id="wrap-internal_client">
      <label>Внутренний клиент</label>
      <select name="internal_client">
        <option value="">—</option>
      </select>
    </div>
    <div class="field hidden" id="wrap-internal_price">
      <label>Стоимость (внутр.)</label>
      <input type="number" name="internal_price" step="0.01" min="0" placeholder="0">
    </div>
    <div class="field">
      <label>Услуга</label>
      <select name="service_id" required>
        <option value="">— выберите —</option>
      </select>
    </div>
    <div class="field" id="wrap-region">
      <label>Регион</label>
      <select name="region_id">
        <option value="">— выберите —</option>
      </select>
    </div>
    <div class="field" id="wrap-client">
      <label>Наименование клиента</label>
      <input type="text" name="client" maxlength="255" placeholder="Организация">
    </div>
    <div class="field" id="wrap-s">
      <label>Площадь (м²) / количество</label>
      <input type="text" name="s" placeholder="Число">
    </div>
    <div class="field">
      <label>Срок разработки</label>
      <select name="srok">
        <option value="">— выберите —</option>
      </select>
    </div>
    <div class="field">
      <label>Параметры объекта / помещение</label>
      <textarea name="room" rows="2" maxlength="500"></textarea>
    </div>
    <div class="field">
      <label>Произвольный текст</label>
      <textarea name="text" rows="2" maxlength="500"></textarea>
    </div>
        <div id="status"></div>
        <button type="submit" class="btn-primary" id="btnSubmit">Сформировать ТКП</button>
        <div id="download-block" class="download-block hidden">
          <p class="download-message">ТКП сформировано. Запись добавлена в реестр. Скачайте файл в нужном формате:</p>
          <div class="download-buttons">
            <a id="btnDownloadPdf" href="#" class="btn-download" target="_blank" rel="noopener">Скачать PDF</a>
            <a id="btnDownloadDocx" href="#" class="btn-download" target="_blank" rel="noopener">Скачать DOCX</a>
          </div>
          <p id="download-pdf-link-row" class="download-link-row hidden">Ссылка на PDF: <a id="linkDownloadPdf" href="#" target="_blank" rel="noopener">открыть</a></p>
        </div>
      </form>
    </div>
  </main>

  <script>
    (function() {
      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
      }

      function haptic(type) {
        if (tg && tg.HapticFeedback) {
          if (type === 'impact') tg.HapticFeedback.impactOccurred('light');
          else if (type === 'selection') tg.HapticFeedback.selectionChanged();
        }
      }

      const form = document.getElementById('form');
      const statusEl = document.getElementById('status');
      const btnSubmit = document.getElementById('btnSubmit');
      const downloadBlock = document.getElementById('download-block');

      // ——— Back Button ———
      if (tg && tg.BackButton) {
        tg.BackButton.show();
        tg.BackButton.onClick(function() {
          haptic('selection');
          window.location.href = '/tkp-app/';
        });
      }

      // ——— Подстановка даты по умолчанию ———
      var dateInput = form.querySelector('input[name="date"]');
      if (dateInput && !dateInput.value) {
        var today = new Date();
        dateInput.value = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
      }

      function setStatus(msg, isError) {
        statusEl.textContent = msg || '';
        statusEl.className = msg ? (isError ? 'error' : 'success') : '';
      }

      function clearFieldErrors() {
        form.querySelectorAll('.field').forEach(function(f) { f.classList.remove('has-error'); });
        form.querySelectorAll('.field-error').forEach(function(el) { el.remove(); });
      }

      function showFieldError(fieldWrap, message) {
        if (!fieldWrap) return;
        fieldWrap.classList.add('has-error');
        var existing = fieldWrap.querySelector('.field-error');
        if (existing) existing.textContent = message;
        else {
          var err = document.createElement('span');
          err.className = 'field-error';
          err.textContent = message;
          fieldWrap.appendChild(err);
        }
      }

      /** Валидация формы: дата и услуга обязательны; для внешнего — клиент; площадь — число при заполнении. */
      function validateForm() {
        clearFieldErrors();
        var isInternal = form.querySelector('input[name="is_internal"]:checked').value === '1';
        var valid = true;
        var dateVal = (form.querySelector('input[name="date"]').value || '').trim();
        if (!dateVal) {
          showFieldError(form.querySelector('input[name="date"]').closest('.field'), 'Укажите дату ТКП');
          valid = false;
        }
        var serviceVal = (form.querySelector('select[name="service_id"]').value || '').trim();
        if (!serviceVal) {
          showFieldError(form.querySelector('select[name="service_id"]').closest('.field'), 'Выберите услугу');
          valid = false;
        }
        if (!isInternal) {
          var clientVal = (form.querySelector('input[name="client"]').value || '').trim();
          if (!clientVal) {
            showFieldError(document.getElementById('wrap-client'), 'Укажите наименование клиента');
            valid = false;
          }
          var sVal = (form.querySelector('input[name="s"]').value || '').trim();
          if (sVal && isNaN(parseFloat(sVal))) {
            showFieldError(document.getElementById('wrap-s'), 'Введите число');
            valid = false;
          }
        } else {
          var internalPrice = (form.querySelector('input[name="internal_price"]').value || '').trim();
          if (internalPrice && isNaN(parseFloat(internalPrice))) {
            showFieldError(document.getElementById('wrap-internal_price'), 'Введите число');
            valid = false;
          }
        }
        var srokVal = (form.querySelector('select[name="srok"]').value || '').trim();
        if (!srokVal) {
          showFieldError(form.querySelector('select[name="srok"]').closest('.field'), 'Выберите срок разработки');
          valid = false;
        }
        return valid;
      }

      function isFormValidForSubmit() {
        var isInternal = form.querySelector('input[name="is_internal"]:checked').value === '1';
        var dateVal = (form.querySelector('input[name="date"]').value || '').trim();
        var serviceVal = (form.querySelector('select[name="service_id"]').value || '').trim();
        var srokVal = (form.querySelector('select[name="srok"]').value || '').trim();
        if (!dateVal || !serviceVal || !srokVal) return false;
        if (!isInternal) {
          var clientVal = (form.querySelector('input[name="client"]').value || '').trim();
          if (!clientVal) return false;
          var sVal = (form.querySelector('input[name="s"]').value || '').trim();
          if (sVal && isNaN(parseFloat(sVal))) return false;
        } else {
          var internalPrice = (form.querySelector('input[name="internal_price"]').value || '').trim();
          if (internalPrice && isNaN(parseFloat(internalPrice))) return false;
        }
        return true;
      }

      function updateMainButton() {
        if (!tg || !tg.MainButton) return;
        var show = !downloadBlock.classList.contains('hidden') ? false : !btnSubmit.disabled && isFormValidForSubmit();
        if (show) {
          tg.MainButton.setText('Сформировать ТКП');
          tg.MainButton.show();
        } else {
          tg.MainButton.hide();
        }
      }

      if (tg && tg.MainButton) {
        tg.MainButton.onClick(function() {
          haptic('impact');
          if (validateForm()) form.requestSubmit();
        });
      }

      function toggleInternal(isInternal) {
        const v = isInternal === true || isInternal === '1';
        document.getElementById('wrap-internal_client').classList.toggle('hidden', !v);
        document.getElementById('wrap-internal_price').classList.toggle('hidden', !v);
        document.getElementById('wrap-region').classList.toggle('hidden', v);
        document.getElementById('wrap-client').classList.toggle('hidden', v);
        document.getElementById('wrap-s').classList.toggle('hidden', v);
        updateMainButton();
      }
      form.querySelectorAll('input[name="is_internal"]').forEach(function(radio) {
        radio.addEventListener('change', function() { haptic('selection'); toggleInternal(radio.value === '1'); });
      });
      toggleInternal(false);

      form.querySelectorAll('input, select, textarea').forEach(function(el) {
        el.addEventListener('input', updateMainButton);
        el.addEventListener('change', function() { clearFieldErrors(); updateMainButton(); });
      });

      const baseUrl = window.location.origin;

      fetch(baseUrl + '/tkp-app/reference/')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          const selService = form.querySelector('select[name="service_id"]');
          data.services.forEach(function(s) {
            // Не показываем услугу "Навигация_стенды" в окне формирования ТКП
            // (оставляем backend-логику без изменений).
            if (s && s.name === 'Навигация_стенды') return;
            const opt = document.createElement('option');
            opt.value = s.id;
            opt.textContent = s.name;
            selService.appendChild(opt);
          });
          const selRegion = form.querySelector('select[name="region_id"]');
          data.regions.forEach(function(r) {
            const opt = document.createElement('option');
            opt.value = r.id;
            opt.textContent = r.name;
            selRegion.appendChild(opt);
          });
          const selInternal = form.querySelector('select[name="internal_client"]');
          (data.internal_clients || []).forEach(function(c) {
            const opt = document.createElement('option');
            opt.value = c.value;
            opt.textContent = c.label;
            selInternal.appendChild(opt);
          });
          const selSrok = form.querySelector('select[name="srok"]');
          (data.srok_choices || []).forEach(function(s) {
            const opt = document.createElement('option');
            opt.value = s.value;
            opt.textContent = s.label;
            selSrok.appendChild(opt);
          });
          updateMainButton();
        })
        .catch(function(e) {
          setStatus('Не удалось загрузить справочники.', true);
        });

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        if (!validateForm()) {
          haptic('impact');
          setStatus('Заполните обязательные поля.', true);
          return;
        }
        const initData = tg ? tg.initData : '';
        if (!initData) {
          setStatus('Откройте приложение из Telegram.', true);
          return;
        }
        haptic('impact');
        var fd = new FormData(form);
        var payload = {
          initData: initData,
          start_param: (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) || ''
        };
        fd.forEach(function(value, key) {
          payload[key] = value;
        });
        payload.is_internal = payload.is_internal === '1';
        btnSubmit.disabled = true;
        if (tg && tg.MainButton) tg.MainButton.hide();
        setStatus('Формирую документ…', false);
        fetch(baseUrl + '/tkp-app/submit/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })
          .then(function(r) {
            return r.json().then(function(data) {
              if (!r.ok) throw new Error(data.error || 'Ошибка');
              return data;
            });
          })
          .then(function(data) {
            setStatus('ТКП сформировано. Запись добавлена в реестр.', false);
            btnSubmit.disabled = false;
            var block = document.getElementById('download-block');
            var btnPdf = document.getElementById('btnDownloadPdf');
            var btnDocx = document.getElementById('btnDownloadDocx');
            var pdfUrl = data.download_url_pdf ? baseUrl + data.download_url_pdf : '';
            var linkPdfRow = document.getElementById('download-pdf-link-row');
            var linkPdf = document.getElementById('linkDownloadPdf');
            if (data.download_url_pdf) {
              btnPdf.href = pdfUrl;
              btnPdf.classList.remove('hidden');
              if (linkPdfRow && linkPdf) {
                linkPdf.href = pdfUrl;
                linkPdf.textContent = 'Скачать PDF';
                linkPdfRow.classList.remove('hidden');
              }
            } else {
              btnPdf.classList.add('hidden');
              if (linkPdfRow) linkPdfRow.classList.add('hidden');
            }
            if (data.download_url_docx) {
              btnDocx.href = baseUrl + data.download_url_docx;
              btnDocx.classList.remove('hidden');
            } else {
              btnDocx.classList.add('hidden');
            }
            block.classList.remove('hidden');
            block.querySelector('.download-message').textContent = 'Скачайте файл в нужном формате:';
            updateMainButton();
            function openDownloadLink(e, url) {
              if (!url || url === '#') return;
              haptic('selection');
              if (tg && tg.openLink) {
                e.preventDefault();
                tg.openLink(url);
              }
            }
            [btnPdf, btnDocx].forEach(function(btn) {
              btn.onclick = function(e) {
                if (btn.href && btn.href !== '#' && !btn.classList.contains('hidden')) {
                  openDownloadLink(e, btn.href);
                }
              };
            });
            if (linkPdf && pdfUrl) {
              linkPdf.onclick = function(e) { openDownloadLink(e, pdfUrl); };
            }
          })
          .catch(function(err) {
            setStatus(err.message || 'Ошибка отправки', true);
            btnSubmit.disabled = false;
            updateMainButton();
          });
      });
    })();
  </script>
</body>
</html>
